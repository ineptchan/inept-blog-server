spring:
  application:
    name: inept-blog-server

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    clean-disabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  messages:
    basename: i18n/messages,i18n/validation,i18n/openapi
    encoding: UTF-8
    fallback-to-system-locale: false

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  mvc:
    problemdetails:
      enabled: true

  jackson:
    time-zone: UTC

server:
  port: 8080

springdoc:
  api-docs:
    path: /openapi/api-docs
    enabled: false
  swagger-ui:
    path: /openapi/swagger-ui
    enabled: false

top:
  inept:
    jwt:
      issuer: ${JWT_ISSUER:boot4-rbac}
      access-secret-key: ${JWT_ACCESS_SECRET_KEY}
      refresh-secret-key: ${JWT_REFRESH_SECRET_KEY}
      access-expires-minutes: 15
      refresh-expires-minutes: 10080 # 7d

    object-storage:
      endpoint: ${MINIO_ENDPOINT}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      region: ${MINIO_REGION:}
      buckets:
        - name: blog-avatar
          public-read: true
          create-pending: true
          pending-retention: 1d
        - name: blog-article-image
          public-read: true
          create-pending: true
          pending-retention: 1d
        - name: blog-article-featured-image
          public-read: true
          create-pending: true
          pending-retention: 1d
        - name: blog-article-video
          public-read: true
          create-pending: true
          pending-retention: 1d
        - name: blog-article-attachment
          public-read: true
          create-pending: true
          pending-retention: 1d
      avatar:
        quality: 82
        method: 4
        max-file-size: 5242880        # 5 MiB
        max-side: 1024
        min-side: 128

      article-image:
        quality: 82
        method: 4
        max-file-size: 20971520       # 20 MiB
        max-side: 2560
        min-side: 64

      article-featured-image:
        quality: 85
        method: 4
        max-file-size: 15728640       # 15 MiB
        max-side: 1920
        min-side: 320

      article-video:
        max-file-size: 524288000      # 500 MiB
        is-compress: true

      article-attachment:
        max-file-size: 104857600      # 100 MiB