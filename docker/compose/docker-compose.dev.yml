services:
  postgres:
    image: postgres:18
    container_name: inept-blog-postgres-dev
    environment:
      POSTGRES_DB: inept_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio:latest
    container_name: inept-blog-minio-dev
    command: server /data
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data

secrets:
  postgres_password:
    file: ../data/secrets/postgres_password.txt
  minio_root_user:
    file: ../data/secrets/minio_root_user.txt
  minio_root_password:
    file: ../data/secrets/minio_root_password.txt
  spring_jwt_access_secret_key:
    file: ../data/secrets/spring_jwt_access_secret_key.txt
  spring_jwt_refresh_secret_key:
    file: ../data/secrets/spring_jwt_refresh_secret_key.txt

volumes:
  postgres_data:
  minio_data: