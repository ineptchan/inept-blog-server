services:
  app:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    container_name: inept-blog-app-test
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inept_blog
      SPRING_DATASOURCE_USERNAME: postgres

      MINIO_ENDPOINT: http://minio:9000
    secrets:
      - source: postgres_password
        target: SPRING_DATASOURCE_PASSWORD

      - source: minio_root_user
        target: MINIO_ACCESS_KEY
      - source: minio_root_password
        target: MINIO_SECRET_KEY

      - source: spring_jwt_access_secret_key
        target: JWT_ACCESS_SECRET_KEY
      - source: spring_jwt_refresh_secret_key
        target: JWT_REFRESH_SECRET_KEY
    depends_on:
      - postgres
      - minio

  postgres:
    image: postgres:18
    container_name: inept-blog-postgres-test
    environment:
      POSTGRES_DB: inept_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio:latest
    container_name: inept-blog-minio-test
    command: server /data
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data

secrets:
  postgres_password:
    file: ../data/secrets/postgres_password.txt
  minio_root_user:
    file: ../data/secrets/minio_root_user.txt
  minio_root_password:
    file: ../data/secrets/minio_root_password.txt
  spring_jwt_access_secret_key:
    file: ../data/secrets/spring_jwt_access_secret_key.txt
  spring_jwt_refresh_secret_key:
    file: ../data/secrets/spring_jwt_refresh_secret_key.txt

volumes:
  postgres_data:
  minio_data: